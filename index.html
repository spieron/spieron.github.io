  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #06090f;
      --blue: #3b7eff;
      --t1:   #edf2ff;
      --t2:   #7e8da4;
      --t3:   #394455;
      --line: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Network canvas ── */
    #net {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Layout ── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
    }

    /* ── Logo ── */
    .logo {
      display: block;
      width: 460px;
      height: auto;
      margin-bottom: 2.2rem;
      filter: drop-shadow(0 0 20px rgba(0,200,255,0.15));
      opacity: 0;
      animation: rise 0.9s ease-out 0.1s forwards;
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(1.8rem, 4.2vw, 2.9rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.14;
      color: var(--t1);
      text-align: center;
      max-width: 560px;
      margin-bottom: 1rem;
      opacity: 0;
      animation: rise 0.9s ease-out 0.22s forwards;
    }

    h1 em {
      font-style: normal;
      color: var(--blue);
    }

    h1 {
      text-shadow: 0 0 20px rgba(59,126,255,0.15);
    }

    /* ── Sub ── */
    p.sub {
      font-size: 0.97rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--t2);
      text-align: center;
      max-width: 390px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 0.9s ease-out 0.34s forwards;
    }

    /* ── CTA ── */
    .cta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: rise 0.9s ease-out 0.46s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      padding: 0.62rem 1.35rem;
      border-radius: 8px;
      transition: all 0.16s ease;
      white-space: nowrap;
      cursor: pointer;
      border: none;
    }

    .btn-solid {
      background: var(--blue);
      color: #fff;
      letter-spacing: 0.01em;
    }

    .btn-solid:hover {
      background: #5592ff;
      box-shadow: 0 0 22px rgba(59,126,255,0.4);
      transform: translateY(-1px);
    }

    .btn-solid:active { transform: none; }

    .btn-ghost {
      background: transparent;
      color: var(--t2);
      border: 1px solid var(--line);
    }

    .btn-ghost:hover {
      color: var(--t1);
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.1rem 2rem;
      font-size: 0.72rem;
      color: var(--t3);
      border-top: 1px solid var(--line);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
      opacity: 0;
      animation: rise 0.9s ease-out 0.58s forwards;
    }

    /* ── Animation ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Accessibility ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--blue);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 0 0 8px 8px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      z-index: 9999;
      transition: top 0.15s;
    }
    .skip-link:focus { top: 0; }

    :focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* ── Safety: very short screens get scroll ── */
    @media (max-height: 580px) {
      html, body { overflow: auto; height: auto; }
      main { padding: 2.5rem 2rem 1.5rem; }
    }

    @media (max-width: 480px) {

      h1 { font-size: 1.7rem; }
      .cta { flex-direction: column; width: 100%; }
      .btn { width: 100%; justify-content: center; }
    }

<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <canvas id="net" aria-hidden="true" role="presentation"></canvas>

  <main id="main-content" aria-label="Spieron — Enterprise Big Data Professional Services">

    <img class="logo" src="assests/logo.png" alt="Spieron logo" />

  <script>
    const canvas = document.getElementById('net');
    const ctx    = canvas.getContext('2d', { alpha: true });
    let W, H, nodes;

    const TOTAL       = 70;
    const MAX_DIST    = 140;
    const MAX_DIST_SQ = MAX_DIST * MAX_DIST;
    const HALF_SQ     = MAX_DIST_SQ * 0.25;
    const NODE_SPEED  = 0.025;  // very slow ambient drift
    const MAX_SPEED   = 0.15;   // hard cap — ~9px/sec max
    const MOUSE_R_SQ  = 180 * 180;

    let mouse       = { x: -9999, y: -9999 };
    let mouseLerped = { x: -9999, y: -9999 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function biasedCoord(min, max) {
      const u = 1 - Math.random(), v = 1 - Math.random();
      const gauss = Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      return Math.max(min, Math.min(max, (min + max) / 2 + gauss * (max - min) * 0.28));
    }

    function setup() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      nodes = Array.from({ length: TOTAL }, (_, i) => {
        const centered = i < TOTAL * 0.4;
        const x = centered ? biasedCoord(0, W) : Math.random() * W;
        const y = centered ? biasedCoord(0, H) : Math.random() * H;
        return { x, y, ox: x, oy: y,
          vx: (Math.random() - 0.5) * NODE_SPEED,
          vy: (Math.random() - 0.5) * NODE_SPEED,
          r:  Math.random() * 1.8 + 0.8 };
      });
    }

    // pre-compute RGB for a node's current x — no sqrt, no strings in hot path
    function rgb(x) {
      const t = x < 0 ? 0 : x > W ? 1 : x / W;
      return [t * 160 | 0, (220 - t * 130) | 0, (220 + t * 35) | 0];
    }

    let lastTs = 0;

    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - lastTs < 14) return;   // cap at ~60 fps — avoids 2× work on 120 Hz
      lastTs = ts;

      ctx.clearRect(0, 0, W, H);

      mouseLerped.x += (mouse.x - mouseLerped.x) * 0.08;
      mouseLerped.y += (mouse.y - mouseLerped.y) * 0.08;

      // ── physics ──
      for (const n of nodes) {
        const dx = mouseLerped.x - n.x, dy = mouseLerped.y - n.y;
        if (dx * dx + dy * dy < MOUSE_R_SQ && mouseLerped.x > 0) {
          n.vx += dx * 0.0004;
          n.vy += dy * 0.0004;
        } else {
          n.vx += (n.ox - n.x) * 0.0002;
          n.vy += (n.oy - n.y) * 0.0002;
        }
        n.vx *= 0.99; n.vy *= 0.99;
        const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
        if (spd > MAX_SPEED) { n.vx = n.vx / spd * MAX_SPEED; n.vy = n.vy / spd * MAX_SPEED; }
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > W) { n.vx *= -1; n.x = n.x < 0 ? 0 : W; }
        if (n.y < 0 || n.y > H) { n.vy *= -1; n.y = n.y < 0 ? 0 : H; }
      }

      // ── lines — batched into 2 paths, 0 shadowBlur ──
      // Batching means 2 stroke() calls total instead of one per pair (~350).
      // No shadowBlur means no per-stroke canvas composite pass.
      ctx.lineWidth = 0.7;

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(80,190,235,0.22)';   // close pairs — brighter
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const dSq = dx * dx + dy * dy;
          if (dSq < HALF_SQ) {
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
          }
        }
      }
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(80,190,235,0.09)';   // far pairs — faint
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const dSq = dx * dx + dy * dy;
          if (dSq >= HALF_SQ && dSq < MAX_DIST_SQ) {
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
          }
        }
      }
      ctx.stroke();

      // ── dots — fake glow via two circles, 0 shadowBlur ──
      for (const n of nodes) {
        const [r, g, b] = rgb(n.x);
        // outer glow ring
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 3.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.06)`;
        ctx.fill();
        // bright core
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.88)`;
        ctx.fill();
      }
    }

    setup();
    requestAnimationFrame(draw);
    window.addEventListener('resize', setup);
  </script>
